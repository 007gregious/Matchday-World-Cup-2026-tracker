# Render Blueprint — optional "Infrastructure as Code" path.
#
# Either:
#  A) Push this repo to GitHub, then in Render click
#     New > Blueprint and point it at the repo — it reads this file and
#     creates the service for you, or
#  B) Ignore this file entirely and create the Web Service by hand in the
#     Render dashboard (New > Web Service). Both end up identical.
#
# Either way, the two API keys are marked `sync: false` so Render prompts
# you to paste them in securely instead of storing them in this file.

services:
  - type: web
    name: matchday-tracker
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.17.0
      - key: COMPETITION_CODE
        value: WC
      - key: API_FOOTBALL_LEAGUE_ID
        value: "1"
      - key: API_FOOTBALL_SEASON
        value: "2026"
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      # Push notifications — all optional, leave unset in the Render
      # dashboard to keep the feature disabled. See .env.example / README.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Push notifications (optional) — leave unset in the Render dashboard
      # to skip the feature entirely. See .env.example for what each does.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
